<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Oladoc</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">Oladoc</a>
            
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#services">Doctors</a></li>
                <li><a href="index.html#services">Hospitals</a></li>
                <li><a href="index.html#services">Labs</a></li>
                <li><a href="index.html#services">Surgeries</a></li>
                <li><a href="index.html#reviews">Blog</a></li>
            </ul>
            
            <div class="nav-buttons" id="navButtons">
                <a href="signup.html" class="btn btn-orange">Join as Doctor</a>
                <a href="login.html" class="btn btn-blue">Login/Signup</a>
            </div>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Create Account</h1>
                    <p>Join Oladoc and book appointments easily</p>
                </div>
                
                <!-- User Type Selection -->
                <div class="user-type-selector">
                    <button type="button" class="type-btn active" data-type="patient">
                        <span>👤</span> Patient
                    </button>
                    <button type="button" class="type-btn" data-type="doctor">
                        <span>👨‍⚕️</span> Doctor
                    </button>
                </div>
                
                <form id="signupForm" class="auth-form">
                    <input type="hidden" id="userType" name="userType" value="patient">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                            <span class="error-message" id="firstNameError"></span>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                            <span class="error-message" id="lastNameError"></span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required>
                        <span class="error-message" id="signupEmailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                        <span class="error-message" id="phoneError"></span>
                    </div>
                    
                    <!-- Doctor-specific fields (hidden by default) -->
                    <div class="doctor-fields" id="doctorFields" style="display: none;">
                        <div class="form-group">
                            <label for="specialization">Specialization</label>
                            <select id="specialization" name="specialization">
                                <option value="">Select your specialization</option>
                                <option value="general">General Physician</option>
                                <option value="cardiologist">Cardiologist</option>
                                <option value="dermatologist">Dermatologist</option>
                                <option value="gynecologist">Gynecologist</option>
                                <option value="pediatrician">Pediatrician</option>
                                <option value="orthopedic">Orthopedic</option>
                                <option value="neurologist">Neurologist</option>
                                <option value="dentist">Dentist</option>
                                <option value="other">Other</option>
                            </select>
                            <span class="error-message" id="specializationError"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="licenseNumber">Medical License Number</label>
                            <input type="text" id="licenseNumber" name="licenseNumber" placeholder="Enter license number">
                            <span class="error-message" id="licenseNumberError"></span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <div class="password-input">
                            <input type="password" id="signupPassword" name="password" placeholder="Create a password" required>
                            <button type="button" class="toggle-password" id="toggleSignupPassword">👁️</button>
                        </div>
                        <span class="error-message" id="signupPasswordError"></span>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">👁️</button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-blue btn-full">Create Account</button>
                    
                    <div class="form-divider">
                        <span>OR</span>
                    </div>
                    
                    <button type="button" class="btn btn-social btn-google">
                        <span>🔍</span> Continue with Google
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 Oladoc. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
